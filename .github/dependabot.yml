version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/resume-site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "vitest"
        versions: ["< 4.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
