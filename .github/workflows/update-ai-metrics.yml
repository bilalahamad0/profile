name: Weekly AI Metrics Update

on:
  schedule:
    - cron: '0 2 * * 0'  # Sunday 02:00 UTC (after CodeQL at 00:00)
  workflow_dispatch:      # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-metrics:
    name: Refresh AI usage stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git rev-list --count is accurate
          token: ${{ secrets.GH_PAT }}  # push as repo admin to bypass branch protection

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update AI metrics
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}
        run: node scripts/update-ai-metrics.js

      - name: Commit and push if metrics changed
        run: |
          git config user.name "bilalahamad-bot"
          git config user.email "bilal.ahamad@gmail.com"
          git add ai-metrics.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: weekly AI metrics update [skip actions]"
            git push origin HEAD
          else
            echo "No changes to commit"
          fi

      - name: Trigger Vercel deployment
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -s -X POST "$HOOK"
            echo "Vercel deploy triggered"
          else
            echo "VERCEL_DEPLOY_HOOK not set — skipping"
          fi
