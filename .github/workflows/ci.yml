name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'resume-site/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./resume-site
        run: npm ci
        
      - name: Run Linter
        working-directory: ./resume-site
        run: npm run lint
        
      - name: Run Unit Tests & Coverage
        working-directory: ./resume-site
        run: npm run test:coverage

  e2e-and-a11y:
    name: Playwright E2E & A11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'resume-site/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./resume-site
        run: npm ci
        
      - name: Install Playwright Browsers
        working-directory: ./resume-site
        run: npx playwright install --with-deps
        
      - name: Run Playwright Tests
        working-directory: ./resume-site
        run: npx playwright test
        
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: resume-site/playwright-report/
          retention-days: 14

  visual-regression:
    name: Lost-Pixel Visual Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'resume-site/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./resume-site
        run: npm ci

      - name: Build Next.js
        working-directory: ./resume-site
        run: npm run build

      - name: Start Next.js server & Run Lost-Pixel
        working-directory: ./resume-site
        run: |
          npm run start & 
          npx wait-on http://localhost:3000
          npx lost-pixel
