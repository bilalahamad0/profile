name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Linter
        run: npm run lint
        
      - name: Run Unit Tests & Coverage
        run: npm run test:coverage

  e2e-and-a11y:
    name: Playwright E2E & A11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          
      - name: Install Dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'content/**', 'public/**', 'next.config.ts', 'tailwind.config.*', 'postcss.config.*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js (required for `next start` webServer)
        run: npm run build

      - name: Run Playwright Tests
        run: npx playwright test
        
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  visual-regression:
    name: Lost-Pixel Visual Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          
      - name: Install Dependencies
        run: npm ci

      # lost-pixel bundles its own playwright-core (v1.47.2 → chromium build 1134)
      # which is a different version from @playwright/test installed at the top level.
      # Install via lost-pixel's bundled binary so the right Chromium revision is fetched.
      - name: Install Playwright Chromium for lost-pixel
        run: node ./node_modules/lost-pixel/node_modules/playwright-core/cli.js install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Start Next.js server & Run Lost-Pixel
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 120000
          npx lost-pixel
